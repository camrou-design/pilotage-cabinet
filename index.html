<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pilotage des réformes — Canvas projet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--blue:#2f75b5;--light:#d9eaf7;--border:#9e9e9e;--ink:#111;--muted:#555;--bg:#f5f5f5;--white:#fff;--green:#1f7a3f;--red:#a61b1b;--amber:#b36b00}
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:20px;color:var(--ink)}
.container{max-width:1180px;margin:auto}.topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}.card{background:#fff;border-radius:8px;padding:18px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{font-size:22px;margin:0 0 8px}.hint{color:var(--muted);font-size:13px;margin-bottom:12px}.btn{padding:9px 13px;border:none;border-radius:6px;cursor:pointer;font-weight:700}.btn-primary{background:#111;color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-ghost{background:#eee;color:#222}.btn-red{background:var(--red);color:#fff}.btn-amber{background:var(--amber);color:#fff}
input,textarea,select{font-family:Arial,sans-serif;border:1px solid #bbb;border-radius:4px;padding:8px;width:100%;background:#fff}textarea{min-height:70px;resize:vertical}.project-head{display:grid;grid-template-columns:1.4fr 180px 150px 120px auto;gap:10px;align-items:end;margin-bottom:12px}.field-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
table.canvas{width:100%;border-collapse:collapse;background:#fff}table.canvas th,table.canvas td{border:1px solid var(--border);padding:7px;vertical-align:top}table.canvas th{background:var(--blue);color:#fff;font-size:13px}.num{width:42px;text-align:center;background:var(--blue);color:#fff;font-weight:700}.bloc{width:180px;background:var(--light);font-weight:700}.question{font-size:12px;color:#111;margin-bottom:6px;line-height:1.35}.content-cell textarea{min-height:82px;border:1px solid #ccc}.validation-box{margin-top:14px;border:1px solid #ccc;border-radius:6px;padding:12px;background:#fbfbfb}.validation-title{font-weight:700;margin-bottom:8px}.validation-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}.log{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}.log th{background:#333;color:#fff}.log td,.log th{border:1px solid #ccc;padding:6px}.status-badge{display:inline-block;padding:3px 7px;border-radius:4px;font-size:12px;font-weight:700}.validated{background:#e7f6ec;color:var(--green)}.pending{background:#fff4de;color:var(--amber)}
.pdf-page{background:#fff;color:#000;width:100%;padding:16px}.pdf-title{font-size:20px;font-weight:700;margin-bottom:6px}.pdf-meta{font-size:12px;color:#444;margin-bottom:12px}.pdf-only{display:none}
@media print{body{background:#fff;padding:0}.topbar,.btn,.no-print{display:none!important}.card{box-shadow:none;border:none;margin:0;padding:0}.pdf-only{display:block}.container{max-width:none}textarea,input,select{border:none;padding:0;resize:none}.validation-box{break-inside:avoid}.canvas tr{break-inside:avoid}}
@media(max-width:900px){.project-head,.validation-grid{grid-template-columns:1fr}.container{padding:0}.bloc{width:auto}}
</style>
</head>
<body>
<div class="container">
  <div class="card no-print">
    <h1>Pilotage des réformes — Canvas projet</h1>
    <div class="hint">Chaque projet est structuré selon les 13 blocs du canvas. Toute modification peut être assimilée à un avenant et faire l’objet d’une validation inscrite dans le journal.</div>
    <div class="topbar">
      <button class="btn btn-primary" onclick="addProject()">+ Ajouter un projet</button>
      <button class="btn btn-blue" onclick="saveData()">💾 Sauvegarder</button>
      <button class="btn btn-ghost" onclick="exportJson()">Exporter données JSON</button>
      <button class="btn btn-ghost" onclick="document.getElementById('import-json').click()">Importer JSON</button>
      <button class="btn btn-green" onclick="exportAllPdf()">📄 Export PDF global</button>
    </div>
    <input type="file" id="import-json" accept=".json" style="display:none" onchange="importJson(event)">
  </div>

  <div id="projects"></div>
</div>

<script>
const BLOCKS=[
 {n:1,k:'enjeux',b:'Enjeux & problématique',q:"Sur quelle problématique porte ce projet ? Ce bloc pose le contexte et la raison d’être du projet. Il répond à la question : pourquoi ce projet existe-t-il et quelle valeur apporte-t-il ?"},
 {n:2,k:'perimetre',b:'Périmètre',q:"Quel est le scope du projet ? Sur quel support travaille-t-on (AGW, décret, circulaire, marché public…) ? Ce bloc délimite ce qui est dans le projet et ce qui ne l’est pas."},
 {n:3,k:'echeances',b:'Échéances',q:"Quel est le délai de réalisation ? Quels sont les jalons clés ? Ce bloc permet d’identifier les dates critiques et de suivre l’avancement dans le temps."},
 {n:4,k:'budget',b:'Budget & ressources',q:"Quel est le budget alloué ? Quelles ressources humaines et techniques sont mobilisées ? Ce bloc permet d’évaluer les moyens disponibles et d’anticiper les manques."},
 {n:5,k:'intervenants',b:'Intervenants',q:"Qui sont les acteurs impliqués dans ce projet ? Quels sont leurs rôles respectifs ? Ce bloc complète la matrice RACI en offrant une vue narrative des acteurs."},
 {n:6,k:'publics',b:'Publics cibles',q:"Qui est directement concerné ou impacté par cette réforme ? Ce bloc distingue les acteurs du projet de ceux qui en bénéficient ou en subissent les effets."},
 {n:7,k:'risques',b:'Risques',q:"Quels sont les risques identifiés (concurrence, budget, résistance au changement…) ? Ce bloc permet d’anticiper les obstacles et de préparer des réponses adaptées."},
 {n:8,k:'contraintes',b:'Contraintes',q:"Quelles sont les contraintes pesant sur le projet (délais politiques, obligations légales, ressources limitées…) ? Ce bloc distingue les risques incertains des contraintes certaines."},
 {n:9,k:'interdependances',b:'Interdépendances',q:"Ce projet est-il lié à d’autres projets ou dossiers ? Quels sont les prérequis bloquants ? Ce bloc est essentiel pour séquencer correctement les actions et éviter les blocages en cascade."},
 {n:10,k:'pointsAttention',b:'Points d’attention',q:"Quelles sont les hypothèses de travail sur lesquelles on s’appuie ? Quels points de vigilance faut-il surveiller (plan légal, politique, organisationnel, publics cibles) ? Ce bloc liste les paris que l’on fait au départ et qu’on devra confirmer ou infirmer."},
 {n:11,k:'objectifs',b:'Objectifs de la réforme',q:"Que cherche-t-on à atteindre concrètement ? Quels sont les résultats attendus ? Ce bloc définit le succès du projet de manière mesurable et partagée."},
 {n:12,k:'suivi',b:'Approche & suivi',q:"Comment le projet est-il piloté au quotidien ? Quelle est la cadence des points de suivi, avec qui et à quels outils ? Ce bloc documente la gouvernance opérationnelle du projet."},
 {n:13,k:'livrables',b:'Livrables & jalons',q:"Quels sont les documents, décisions ou actions concrètes attendus en sortie ? Ce bloc liste les outputs tangibles permettant de vérifier l’avancement et de clôturer les étapes."}
];
const TEMPLATE=Object.fromEntries(BLOCKS.map(x=>[x.k,'']));
let data={projects:[]};
function defaultProject(){return {id:Date.now(),name:'Nouveau projet',owner:'',status:'À compléter',version:1,validated:false,fields:{...TEMPLATE},validations:[]}}
function loadData(){try{const saved=localStorage.getItem('canvas-reformes-v2');if(saved)data=JSON.parse(saved)}catch(e){console.warn(e)}if(!data.projects.length)data.projects=[defaultProject()];render()}
function saveData(){localStorage.setItem('canvas-reformes-v2',JSON.stringify(data));toast('Données sauvegardées')}
function addProject(){data.projects.push(defaultProject());saveData();render()}
function deleteProject(id){if(confirm('Supprimer ce projet ?')){data.projects=data.projects.filter(p=>p.id!==id);saveData();render()}}
function project(id){return data.projects.find(p=>p.id===id)}
function updateMeta(id,key,value){const p=project(id);p[key]=value;p.validated=false;saveData();renderSoftValidation(id)}
function updateField(id,key,value){const p=project(id);p.fields[key]=value;p.validated=false;saveData();renderSoftValidation(id)}
function renderSoftValidation(id){const el=document.getElementById('val-state-'+id);if(el){el.textContent='Validation requise après modification';el.className='status-badge pending'}}
function addValidation(id){const p=project(id);const who=document.getElementById('validator-'+id).value.trim();const decision=document.getElementById('decision-'+id).value;const comment=document.getElementById('val-comment-'+id).value.trim();if(!who){alert('Indiquez la personne qui valide.');return}p.version=(p.version||1)+1;p.validated=decision==='Validé';p.validations.push({date:new Date().toLocaleString('fr-BE'),who,decision,comment,version:p.version});document.getElementById('val-comment-'+id).value='';saveData();render()}
function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
function render(){document.getElementById('projects').innerHTML=data.projects.map(p=>projectHtml(p)).join('')}
function projectHtml(p){return `<section class="card project-card" id="project-${p.id}">
  <div class="project-head no-print">
    <div><div class="field-label">Nom du projet</div><input value="${esc(p.name)}" onchange="updateMeta(${p.id},'name',this.value)"></div>
    <div><div class="field-label">Pilote</div><input value="${esc(p.owner)}" onchange="updateMeta(${p.id},'owner',this.value)"></div>
    <div><div class="field-label">Statut</div><input value="${esc(p.status)}" onchange="updateMeta(${p.id},'status',this.value)"></div>
    <div><div class="field-label">Version</div><input value="${esc(p.version||1)}" disabled></div>
    <div><button class="btn btn-green" onclick="exportOnePdf(${p.id})">PDF</button><button class="btn btn-red" onclick="deleteProject(${p.id})">×</button></div>
  </div>
  <div class="pdf-page" id="pdf-${p.id}">
    <div class="pdf-title">Canvas projet — ${esc(p.name)}</div>
    <div class="pdf-meta">Pilote : ${esc(p.owner||'—')} · Statut : ${esc(p.status||'—')} · Version : ${esc(p.version||1)} · État : ${p.validated?'Validé':'Validation requise'} · Export : ${new Date().toLocaleDateString('fr-BE')}</div>
    <table class="canvas">
      <thead><tr><th style="width:42px">#</th><th style="width:180px">Bloc</th><th>Question guide / Objectif du bloc</th><th>Contenu du projet</th></tr></thead>
      <tbody>${BLOCKS.map(bl=>`<tr><td class="num">${bl.n}</td><td class="bloc">${bl.b}</td><td><div class="question">${esc(bl.q)}</div></td><td class="content-cell"><textarea onchange="updateField(${p.id},'${bl.k}',this.value)">${esc(p.fields[bl.k]||'')}</textarea></td></tr>`).join('')}</tbody>
    </table>
    <div class="validation-box">
      <div class="validation-title">Validation / avenant</div>
      <div>État actuel : <span id="val-state-${p.id}" class="status-badge ${p.validated?'validated':'pending'}">${p.validated?'Validé':'Validation requise'}</span></div>
      <div class="validation-grid no-print" style="margin-top:10px">
        <div><div class="field-label">Validé par</div><input id="validator-${p.id}" placeholder="Nom / fonction"></div>
        <div><div class="field-label">Décision</div><select id="decision-${p.id}"><option>Validé</option><option>Validé avec réserves</option><option>Refusé</option><option>À revoir</option></select></div>
        <div><div class="field-label">Commentaire</div><input id="val-comment-${p.id}" placeholder="Motif / portée de l’avenant"></div>
      </div>
      <button class="btn btn-amber no-print" onclick="addValidation(${p.id})">Inscrire la validation</button>
      <table class="log"><thead><tr><th>Date</th><th>Version</th><th>Validé par</th><th>Décision</th><th>Commentaire</th></tr></thead><tbody>${(p.validations||[]).map(v=>`<tr><td>${esc(v.date)}</td><td>${esc(v.version)}</td><td>${esc(v.who)}</td><td>${esc(v.decision)}</td><td>${esc(v.comment)}</td></tr>`).join('')||'<tr><td colspan="5">Aucune validation inscrite.</td></tr>'}</tbody></table>
    </div>
  </div>
</section>`}
function exportOnePdf(id){saveData();const p=project(id);const element=document.getElementById('pdf-'+id);html2pdf().set({margin:8,filename:`canvas-${safeFile(p.name)}-v${p.version||1}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(element).save()}
function exportAllPdf(){saveData();const wrapper=document.createElement('div');wrapper.style.background='#fff';wrapper.innerHTML=data.projects.map(p=>document.getElementById('pdf-'+p.id).outerHTML+'<div style="page-break-after:always"></div>').join('');html2pdf().set({margin:8,filename:`canvas-projets-${new Date().toISOString().slice(0,10)}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(wrapper).save()}
function safeFile(s){return String(s||'projet').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function exportJson(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='canvas-projets-donnees.json';a.click();URL.revokeObjectURL(a.href)}
function importJson(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const imported=JSON.parse(ev.target.result);if(!Array.isArray(imported.projects))throw new Error();data=imported;saveData();render();toast('Import réussi')}catch{alert('Fichier invalide')}};reader.readAsText(file);e.target.value=''}
function toast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 14px;border-radius:6px;z-index:9999';document.body.appendChild(t)}t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',1800)}
loadData();
</script>
</body>
</html>
