<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Canvas projets — Cabinet Desquesnes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12120F; --ink2:#2C2C28; --muted:#6B6B62;
  --border:#E4E3DC; --surface:#FAFAF7; --card:#FFFFFF;
  --gold:#B8860B; --gold-l:#FDF8EC;
  --emerald:#1A6B45; --emerald-l:#EDF7F1;
  --amber:#B54708; --amber-l:#FEF4EC;
  --crimson:#9B1C1C; --crimson-l:#FDF2F2;
  --slate:#374151; --slate-l:#F1F5F9;
  --blue:#1D4ED8; --blue-l:#EFF6FF;
  --r4:4px; --r8:8px; --r12:12px; --r20:20px;
  --shadow:0 2px 8px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --ff-head:'Roboto Slab',serif;
  --ff-body:'Roboto',sans-serif;
  --ff-mono:'Roboto Mono',monospace;
  --tr:160ms cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff-body);background:var(--surface);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--ink);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.hdr-rule{height:3px;background:linear-gradient(90deg,var(--gold),#E8C547,var(--gold))}
.hdr-body{max-width:1400px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-emblem{width:32px;height:32px;border:1.5px solid rgba(184,134,11,.5);border-radius:var(--r4);display:flex;align-items:center;justify-content:center;font-family:var(--ff-head);font-size:.95rem;font-weight:700;color:#E8C547;flex-shrink:0}
.hdr-title{font-family:var(--ff-head);font-size:.9rem;font-weight:600;color:#F5F4EF}
.hdr-sub{font-size:.65rem;color:#9CA3AF;font-weight:300;margin-top:1px}
.hdr-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:var(--r4);border:1px solid transparent;font-family:var(--ff-body);font-size:.78rem;font-weight:500;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--ink2);color:#fff;border-color:var(--ink2)}
.btn-primary:hover{background:var(--ink)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-gold:hover{filter:brightness(.92)}
.btn-emerald{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.btn-emerald:hover{filter:brightness(.92)}
.btn-ghost{background:rgba(255,255,255,.08);color:#D1D5DB;border-color:rgba(255,255,255,.12)}
.btn-ghost:hover{background:rgba(255,255,255,.15)}
.btn-danger{background:var(--crimson);color:#fff;border-color:var(--crimson)}
.btn-danger:hover{filter:brightness(.92)}
.btn-sm{padding:5px 10px;font-size:.72rem}

/* LAYOUT */
.layout{max-width:1400px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:260px 1fr;gap:1.25rem}

/* SIDEBAR */
.sidebar{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:1rem;box-shadow:var(--shadow);height:fit-content;position:sticky;top:72px}
.sidebar-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem}
.proj-list{display:flex;flex-direction:column;gap:5px}
.proj-item{border:1px solid var(--border);border-radius:var(--r8);padding:9px 10px;cursor:pointer;transition:all var(--tr)}
.proj-item:hover{border-color:var(--gold);background:var(--gold-l)}
.proj-item.active{border-color:var(--gold);background:var(--gold-l)}
.pi-name{font-weight:600;font-size:.8rem;line-height:1.3}
.pi-meta{font-size:.65rem;color:var(--muted);margin-top:3px}
.pi-status{display:inline-block;border-radius:var(--r4);padding:2px 6px;font-size:.65rem;font-weight:600;margin-top:4px}
.vs-ok{background:var(--emerald-l);color:var(--emerald)}
.vs-pend{background:var(--amber-l);color:var(--amber)}
.vs-rej{background:var(--crimson-l);color:var(--crimson)}

/* MAIN PANEL */
.main-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:1.5rem;box-shadow:var(--shadow)}

/* PROJECT HEAD */
.proj-head{display:grid;grid-template-columns:1.6fr 1fr 1fr 90px;gap:10px;margin-bottom:1.25rem}
.field label{display:block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:var(--r4);padding:8px 10px;font-family:var(--ff-body);font-size:.85rem;color:var(--ink);outline:none;background:var(--card);transition:border-color var(--tr)}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,134,11,.1)}

/* VALIDATION STRIP */
.val-strip{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:.75rem 1rem;margin-bottom:1.25rem;gap:10px}
.val-strip-left{font-size:.8rem;font-weight:500;display:flex;align-items:center;gap:8px}
.status-badge{display:inline-block;border-radius:var(--r4);padding:3px 9px;font-size:.72rem;font-weight:600}

/* CANVAS TABLE */
.canvas-wrap{overflow-x:auto;margin-bottom:1.25rem}
.ctbl{width:100%;border-collapse:collapse;font-size:.8rem}
.ctbl th,.ctbl td{border:1px solid #C8C7C0;padding:8px 10px;vertical-align:top}
.ctbl thead th{background:var(--ink);color:#F5F4EF;font-family:var(--ff-head);font-size:.72rem;font-weight:600;letter-spacing:.03em;text-align:left}
.ctbl thead th:first-child{width:38px;text-align:center}
.ctbl thead th:nth-child(2){width:180px}
.ctbl thead th:nth-child(3){width:35%}
.ctbl .num{width:38px;text-align:center;background:var(--ink2);color:#E8C547;font-family:var(--ff-mono);font-weight:600;font-size:.85rem}
.ctbl .bloc-cell{background:#F0EFE8;font-weight:700;font-size:.78rem;color:var(--ink);border-left:3px solid var(--gold)}
.ctbl .q-cell{font-size:.75rem;color:var(--ink2);line-height:1.55;background:#FAFAF7}
.ctbl .a-cell{background:#fff}
.ctbl textarea{width:100%;min-height:88px;border:1px solid var(--border);border-radius:var(--r4);padding:7px 9px;font-family:var(--ff-body);font-size:.78rem;color:var(--ink);resize:vertical;outline:none;transition:border-color var(--tr);background:#fff}
.ctbl textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,134,11,.08)}
.ctbl tr:hover .bloc-cell{background:#ECE9DE}

/* VALIDATION PANEL */
.val-panel{border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);padding:1.25rem;margin-top:1.25rem}
.val-panel-title{font-family:var(--ff-head);font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.val-form{display:grid;grid-template-columns:1fr 1fr 1.5fr auto;gap:10px;align-items:end;margin-bottom:1rem}
.val-log{width:100%;border-collapse:collapse;font-size:.75rem}
.val-log th,.val-log td{border:1px solid var(--border);padding:7px 9px;vertical-align:top}
.val-log th{background:var(--ink2);color:#F5F4EF;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.val-log tr:hover td{background:var(--surface)}

/* PDF SPECIFIC */
.pdf-title,.pdf-meta{display:none}

/* TOAST */
.toast{position:fixed;right:1.25rem;bottom:1.25rem;background:var(--ink);color:#F5F4EF;padding:.75rem 1.25rem;border-radius:var(--r8);font-size:.78rem;font-weight:500;border-left:3px solid var(--gold);box-shadow:var(--shadow-lg);display:none;z-index:9999}

/* PRINT / PDF */
@media print{
  body{background:#fff;padding:0}
  .hdr,.sidebar,.hdr-actions,.val-form,.no-print{display:none!important}
  .layout{display:block;padding:0}
  .main-panel{box-shadow:none;border:none;padding:0}
  .pdf-title,.pdf-meta{display:block}
  .pdf-title{font-family:var(--ff-head);font-size:18px;font-weight:700;margin-bottom:6px}
  .pdf-meta{font-size:11px;color:var(--muted);margin-bottom:14px}
  .ctbl textarea{border:none;resize:none;min-height:60px}
  .ctbl tr{break-inside:avoid}
  .val-panel{break-inside:avoid}
}
</style>
</head>

let state={selected:null,projects:[]};

function newProject(seed={}){
  return {
    id: (crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())),
    name: seed.name||'Nouveau projet',
    pilot: seed.pilot||'Camille',
    statut: seed.statut||'À compléter',
    version: 1,
    validationState: 'Validation requise',
    fields: {...TMPL,...(seed.fields||{})},
    validations: []
  };
}

function init(){
  const saved=localStorage.getItem('canvas-desquesnes-v1');
  if(saved){try{state=JSON.parse(saved)}catch(e){}}
  if(!state.projects||!state.projects.length){
    state.projects=SEED.map(s=>newProject(s));
    state.selected=state.projects[0].id;
  }
  if(!state.selected&&state.projects.length)state.selected=state.projects[0].id;
  render();
}

function save(){localStorage.setItem('canvas-desquesnes-v1',JSON.stringify(state));toast('Sauvegardé ✓')}
function cur(){return state.projects.find(p=>p.id===state.selected)}
function selP(id){state.selected=id;save();render()}
function addProject(){const p=newProject();state.projects.push(p);state.selected=p.id;save();render()}
function delCur(){
  const p=cur();if(!p)return;
  if(!confirm('Supprimer ce projet du canvas ?'))return;
  state.projects=state.projects.filter(x=>x.id!==p.id);
  state.selected=state.projects[0]?.id||null;
  save();render();
}
function updMeta(k,v){const p=cur();p[k]=v;p.validationState='Validation requise';save();renderList()}
function updField(k,v){const p=cur();p.fields[k]=v;p.validationState='Validation requise';save();renderList()}

function inscribeValidation(){
  const p=cur();
  const who=document.getElementById('v-who').value.trim();
  const dec=document.getElementById('v-dec').value;
  const com=document.getElementById('v-com').value.trim();
  if(!who){alert('Indiquez la personne qui valide.');return;}
  p.version+=1;p.validationState=dec;
  p.validations.push({date:new Date().toLocaleString('fr-BE'),version:p.version,who,dec,com});
  save();render();
}

function render(){renderList();renderMain()}

function renderList(){
  document.getElementById('proj-list').innerHTML=state.projects.map(p=>`
    <div class="proj-item ${p.id===state.selected?'active':''}" onclick="selP('${p.id}')">
      <div class="pi-name">${esc(p.name)}</div>
      <div class="pi-meta">Version ${p.version} · ${esc(p.statut||'—')}</div>
      <span class="pi-status ${VSTYLE[p.validationState]||'vs-pend'}">${esc(p.validationState)}</span>
    </div>`).join('');
}

function renderMain(){
  const p=cur();const panel=document.getElementById('main-panel');
  if(!p){panel.innerHTML='<p style="color:var(--muted);padding:2rem">Aucun projet sélectionné.</p>';return;}
  const vsc=VSTYLE[p.validationState]||'vs-pend';
  panel.innerHTML=`
    <div class="no-print">
      <div class="proj-head">
        <div class="field"><label>Nom du projet</label><input value="${esc(p.name)}" onchange="updMeta('name',this.value)"></div>
        <div class="field"><label>Pilote</label><input value="${esc(p.pilot)}" onchange="updMeta('pilot',this.value)"></div>
        <div class="field"><label>Statut projet</label>
          <select onchange="updMeta('statut',this.value)">
            ${['En cours','À risque','Bloqué','Terminé','À planifier'].map(s=>`<option ${s===p.statut?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Version</label><input value="${p.version}" disabled style="background:var(--surface);color:var(--muted)"></div>
      </div>
      <div class="val-strip">
        <div class="val-strip-left">
          État de validation :&nbsp;<span class="status-badge ${vsc}">${esc(p.validationState)}</span>
        </div>
        <button class="btn btn-danger btn-sm" onclick="delCur()">Supprimer</button>
      </div>
    </div>

    <div id="pdf-area">
      <div class="pdf-title">Canvas projet — ${esc(p.name)}</div>
      <div class="pdf-meta">Pilote : ${esc(p.pilot||'—')} &nbsp;·&nbsp; Statut : ${esc(p.statut||'—')} &nbsp;·&nbsp; Version : ${p.version} &nbsp;·&nbsp; Validation : ${esc(p.validationState)} &nbsp;·&nbsp; Exporté le ${new Date().toLocaleDateString('fr-BE')}</div>
      <div class="canvas-wrap">
        <table class="ctbl">
          <thead><tr>
            <th>#</th>
            <th>Bloc</th>
            <th>Question guide / Objectif du bloc</th>
            <th>Contenu du projet</th>
          </tr></thead>
          <tbody>
            ${BLOCKS.map(bl=>`<tr>
              <td class="num">${bl.n}</td>
              <td class="bloc-cell">${esc(bl.b)}</td>
              <td class="q-cell">${esc(bl.q)}</td>
              <td class="a-cell"><textarea onblur="updField('${bl.k}',this.value)">${esc(p.fields[bl.k]||'')}</textarea></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="val-panel">
        <div class="val-panel-title">Validation / Avenant</div>
        <div class="no-print val-form">
          <div class="field"><label>Validé par</label><input id="v-who" placeholder="Nom / Fonction"></div>
          <div class="field"><label>Décision</label>
            <select id="v-dec">
              <option>Validé</option>
              <option>Validé avec réserves</option>
              <option>À revoir</option>
              <option>Refusé</option>
            </select>
          </div>
          <div class="field"><label>Commentaire / Portée</label><input id="v-com" placeholder="Portée de l'avenant, réserve, motif…"></div>
          <button class="btn btn-gold" onclick="inscribeValidation()">Inscrire</button>
        </div>
        <table class="val-log">
          <thead><tr><th>Date</th><th>Version</th><th>Validé par</th><th>Décision</th><th>Commentaire</th></tr></thead>
          <tbody>
            ${p.validations.length
              ? p.validations.map(v=>`<tr><td>${esc(v.date)}</td><td>${v.version}</td><td>${esc(v.who)}</td><td><span class="status-badge ${VSTYLE[v.dec]||'vs-pend'}">${esc(v.dec)}</span></td><td>${esc(v.com)}</td></tr>`).join('')
              : '<tr><td colspan="5" style="color:var(--muted);font-style:italic">Aucune validation inscrite.</td></tr>'
            }
          </tbody>
        </table>
      </div>
    </div>`;
}

function exportPdf(){
  save();
  const p=cur();if(!p)return;
  const area=document.getElementById('pdf-area');
  const opt={
    margin:8,
    filename:`canvas-${safe(p.name)}-v${p.version}.pdf`,
    image:{type:'jpeg',quality:.97},
    html2canvas:{scale:2,useCORS:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}
  };
  html2pdf().set(opt).from(area).save();
  toast('Export PDF en cours…');
}

function exportJson(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='canvas-cabinet-${new Date().toISOString().slice(0,10)}.json';
  a.click();URL.revokeObjectURL(a.href);
  toast('JSON exporté ✓');
}

function importJson(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.projects))throw new Error();
      state=d;save();render();toast('Import réussi ✓');
    }catch{alert('Fichier invalide.')}
  };
  r.readAsText(file);e.target.value='';
}

function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
function safe(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2000)}

init();
</script>
</body></html>
